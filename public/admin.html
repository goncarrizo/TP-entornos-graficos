<!doctype html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Panel Admin</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="/css/styles.css" />
</head>
<body>
  <div id="navbar-placeholder"></div>
  <main class="container my-4">
    <h1 class="h3">Panel Administrador</h1>
    <p id="admin-message" class="text-muted"></p>

    <div class="row g-3">
      <div class="col-md-6">
        <div class="card p-3">
          <h5>Aerolineas</h5>
          <ul id="admin-airlines" class="list-group"></ul>
        </div>
      </div>
      <div class="col-md-6">
        <div class="card p-3">
          <h5>Promociones (aprobar/denegar)</h5>
          <ul id="admin-promos" class="list-group"></ul>
        </div>
      </div>
      <div class="col-md-6">
        <div class="card p-3">
          <h5>Crear novedad</h5>
          <form id="news-form">
            <div class="mb-2"><input class="form-control" name="title" placeholder="Titulo" required /></div>
            <div class="mb-2"><textarea class="form-control" name="content" placeholder="Contenido" rows="4" required></textarea></div>
            <button class="btn btn-primary" type="submit">Publicar</button>
          </form>
        </div>
      </div>
      <div class="col-md-6">
        <div id="admin-reports"></div>
      </div>
    </div>
  </main>
  <div id="footer-placeholder"></div>
  <script src="/js/api.js"></script>
  <script src="/js/main.js"></script>
  <script src="/js/admin.js"></script>
</body>
</html>
