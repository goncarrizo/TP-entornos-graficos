<!doctype html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Panel CEO</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="/css/styles.css" />
</head>
<body>
  <div id="navbar-placeholder"></div>
  <main class="container my-4">
    <h1 class="h3">Panel CEO</h1>
    <p id="ceo-message" class="text-muted"></p>

    <div class="row g-3">
      <div class="col-md-6">
        <div class="card p-3">
          <h5>Crear vuelo</h5>
          <form id="flight-form" class="row g-2">
            <div class="col-12"><input class="form-control" type="number" name="airline_id" placeholder="ID Aerolinea" required /></div>
            <div class="col-6"><input class="form-control" name="origin" placeholder="Origen" required /></div>
            <div class="col-6"><input class="form-control" name="destination" placeholder="Destino" required /></div>
            <div class="col-6"><input class="form-control" type="datetime-local" name="departure_time" required /></div>
            <div class="col-6"><input class="form-control" type="datetime-local" name="arrival_time" required /></div>
            <div class="col-6"><input class="form-control" type="number" name="price" placeholder="Precio" required /></div>
            <div class="col-6"><input class="form-control" type="number" name="total_seats" placeholder="Asientos" required /></div>
            <div class="col-12"><button class="btn btn-primary" type="submit">Guardar vuelo</button></div>
          </form>
        </div>
      </div>

      <div class="col-md-6">
        <div class="card p-3">
          <h5>Crear promocion</h5>
          <form id="promo-form" class="row g-2">
            <div class="col-12"><input class="form-control" type="number" name="airline_id" placeholder="ID Aerolinea" required /></div>
            <div class="col-12"><input class="form-control" name="title" placeholder="Titulo" required /></div>
            <div class="col-12"><textarea class="form-control" name="description" placeholder="Descripcion" rows="3"></textarea></div>
            <div class="col-12"><input class="form-control" type="number" name="discount_percent" placeholder="Descuento %" required /></div>
            <div class="col-12"><button class="btn btn-success" type="submit">Enviar promocion</button></div>
          </form>
        </div>
      </div>

      <div class="col-md-6">
        <div class="card p-3">
          <h5>Listado de vuelos</h5>
          <ul id="ceo-flights" class="list-group"></ul>
        </div>
      </div>

      <div class="col-md-6">
        <div id="ceo-reports"></div>
      </div>
    </div>
  </main>

  <div id="footer-placeholder"></div>
  <script src="/js/api.js"></script>
  <script src="/js/main.js"></script>
  <script src="/js/ceo.js"></script>
</body>
</html>
