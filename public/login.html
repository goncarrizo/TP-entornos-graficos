<!doctype html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login y Registro</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="/css/styles.css" />
</head>
<body>
  <div id="navbar-placeholder"></div>

  <main class="container my-4">
    <div class="row g-4">
      <div class="col-md-6">
        <div class="card p-4">
          <h2 class="h4">Iniciar sesion</h2>
          <form id="login-form">
            <div class="mb-3">
              <label class="form-label">Email</label>
              <input class="form-control" type="email" name="email" required />
            </div>
            <div class="mb-3">
              <label class="form-label">Clave</label>
              <input class="form-control" type="password" name="password" required />
            </div>
            <button class="btn btn-primary w-100" type="submit">Ingresar</button>
          </form>
          <small class="text-muted mt-3 d-block">Usuarios demo: admin@tp.com / 123456, ceo@tp.com / 123456, cliente@tp.com / 123456</small>
        </div>
      </div>

      <div class="col-md-6">
        <div class="card p-4">
          <h2 class="h4">Registrarse</h2>
          <form id="register-form">
            <div class="mb-3">
              <label class="form-label">Nombre</label>
              <input class="form-control" type="text" name="name" required />
            </div>
            <div class="mb-3">
              <label class="form-label">Email</label>
              <input class="form-control" type="email" name="email" required />
            </div>
            <div class="mb-3">
              <label class="form-label">Clave (min 6)</label>
              <input class="form-control" type="password" name="password" minlength="6" required />
            </div>
            <button class="btn btn-success w-100" type="submit">Crear cuenta</button>
          </form>
        </div>
      </div>
    </div>
  </main>

  <div id="footer-placeholder"></div>
  <script src="/js/api.js"></script>
  <script src="/js/main.js"></script>
  <script src="/js/auth.js"></script>
</body>
</html>
