<!doctype html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Busqueda de vuelos</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="/css/styles.css" />
</head>
<body>
  <div id="navbar-placeholder"></div>

  <main class="container my-4">
    <h1 class="h3 mb-3">Buscar vuelos</h1>

    <form id="search-form" class="card p-3 mb-3">
      <div class="row g-2">
        <div class="col-md-4"><input class="form-control" name="origin" placeholder="Origen" /></div>
        <div class="col-md-4"><input class="form-control" name="destination" placeholder="Destino" /></div>
        <div class="col-md-3"><input class="form-control" type="date" name="date" /></div>
        <div class="col-md-1"><button class="btn btn-primary w-100" type="submit">Ir</button></div>
      </div>
    </form>

    <div id="flight-list" class="row g-3"></div>
  </main>

  <div id="footer-placeholder"></div>
  <script src="/js/api.js"></script>
  <script src="/js/main.js"></script>
  <script src="/js/flights.js"></script>
</body>
</html>
